services:
  - type: web
    name: medzy-app
    runtime: node
    region: singapore
    plan: free
    
    buildCommand: npm run build
    startCommand: npm run start
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
    
    # Add your environment variables here
    # Reference them from .env using Render secrets
