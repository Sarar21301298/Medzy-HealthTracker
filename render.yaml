services:
  - type: web
    name: medzy-app
    runtime: node
    region: singapore
    plan: free
    
    buildCommand: npm install --production=false && npx puppeteer browsers install chrome && npm run build
    startCommand: npm run start
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
      - key: PORT
        value: 10000
    
    # Add your environment variables here
    # Reference them from .env using Render secrets
